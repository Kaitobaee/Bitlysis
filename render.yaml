# Phase 11 — Render Blueprint (staging/production).
# Thay service name / branch và gán secrets trên dashboard (OPENROUTER_API_KEY, …).
# Staging URL ví dụ: https://bitlysis-api-staging.onrender.com

services:
  - type: web
    name: bitlysis-api-staging
    runtime: docker
    region: frankfurt
    plan: starter
    branch: main
    dockerfilePath: ./services/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: APP_ENVIRONMENT
        value: production
      - key: API_CORS_ORIGINS
        sync: false
      - key: API_TRUSTED_HOSTS
        sync: false
      - key: UPLOAD_DIR
        value: /data/uploads

  - type: worker
    name: bitlysis-r-pipeline-staging
    runtime: docker
    region: frankfurt
    plan: starter
    branch: main
    dockerfilePath: ./packages/r-pipeline/Dockerfile
    dockerContext: .
    envVars:
      - key: BITLYSIS_R_PKG_ROOT
        value: /opt/bitlysis/packages/r-pipeline
