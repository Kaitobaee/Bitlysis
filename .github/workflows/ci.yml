name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (ruff, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check app tests scripts

      - name: Pytest
        run: pytest tests -q --tb=short

  r-pipeline:
    name: R pipeline (testthat)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/r-pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.2"
          use-public-rspm: true

      - name: Prepare R library path
        run: |
          mkdir -p "${HOME}/R/library"
          echo "R_LIBS_USER=${HOME}/R/library" >> "${GITHUB_ENV}"

      - uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-4.4-${{ runner.os }}-${{ hashFiles('packages/r-pipeline/DESCRIPTION', 'packages/r-pipeline/renv.lock') }}
          restore-keys: |
            r-4.4-${{ runner.os }}-

      - name: Install R dependencies
        run: Rscript tools/ci_install.R

      - name: testthat
        run: Rscript -e "testthat::test_dir('tests/testthat', reporter = 'summary')"

  web:
    name: Web (lint, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:web

      - name: Build
        run: pnpm build:web
