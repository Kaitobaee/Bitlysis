name = "bitlysis-worker-gateway"
main = "src/index.ts"
compatibility_date = "2026-04-27"
compatibility_flags = ["nodejs_compat"]

[vars]
ALLOWED_ORIGIN = "http://localhost:3000"

[observability]
enabled = true
head_sampling_rate = 1

